<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subtitle Error Checker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .page { max-width: 1300px; margin: 0 auto; padding: 2rem 1.5rem; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle-text { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .card { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
  .card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 1rem; }
  .row { display: flex; gap: 1.25rem; flex-wrap: wrap; align-items: flex-start; }
  .upload-area { border: 2px dashed #ccc; border-radius: 10px; padding: 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; background: #fafafa; }
  .upload-area:hover, .upload-area.drag-over { border-color: #5c5fef; background: #f0f0ff; }
  .upload-area input[type=file] { display: none; }
  .upload-icon { font-size: 32px; margin-bottom: 0.5rem; }
  .upload-label { font-size: 14px; color: #555; }
  .upload-label strong { color: #5c5fef; cursor: pointer; }
  .file-name { margin-top: 0.75rem; font-size: 13px; color: #5c5fef; font-weight: 500; }
  select { padding: 0.45rem 0.75rem; border: 0.5px solid #ccc; border-radius: 8px; font-size: 14px; background: #fff; cursor: pointer; }
  .checks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 0.5rem; }
  .check-item { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.5rem 0.6rem; border-radius: 8px; cursor: pointer; transition: background 0.15s; user-select: none; }
  .check-item:hover { background: #f5f5f0; }
  .check-item input[type=checkbox] { margin-top: 3px; accent-color: #5c5fef; width: 15px; height: 15px; flex-shrink: 0; cursor: pointer; }
  .check-label { font-size: 13.5px; color: #333; line-height: 1.4; }
  .check-num { font-size: 11px; font-weight: 600; color: #999; min-width: 18px; }
  .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.4rem; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #5c5fef; color: #fff; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { background: #bbb; cursor: not-allowed; }
  .btn-secondary { background: #f0f0f0; color: #444; border: 0.5px solid #ccc; }
  .btn-secondary:hover { background: #e8e8e8; }
  .controls-row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-top: 1rem; }
  .stats-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .stat-box { background: #f5f5f0; border-radius: 8px; padding: 0.6rem 1rem; min-width: 120px; }
  .stat-box .val { font-size: 20px; font-weight: 600; }
  .stat-box .lbl { font-size: 12px; color: #888; }
  .stat-box.err { border-left: 4px solid #c0392b; }
  .stat-box.err .val { color: #c0392b; }
  #results-area { display: none; }
  .results-table-wrap { overflow-x: auto; border-radius: 10px; border: 0.5px solid #ddd; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #f5f5f0; padding: 0.6rem 0.75rem; text-align: left; font-weight: 600; color: #666; border-bottom: 0.5px solid #ddd; }
  tbody td { padding: 0.55rem 0.75rem; border-bottom: 0.5px solid #eee; vertical-align: top; }
  tr.has-error { background: #fff8e1; }
  .etag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 5px; background: #fde8e8; color: #c0392b; border: 0.5px solid #f5c6c6; margin: 2px; }
  .dialogue-cell { white-space: pre-wrap; max-width: 360px; }
</style>
</head>
<body>
<div class="page">
  <h1>Subtitle Error Checker</h1>
  <div class="card">
    <div class="card-title">File &amp; Settings</div>
    <div class="row">
      <div style="flex:1;min-width:220px;">
        <div class="upload-area" id="drop-zone">
          <input type="file" id="file-input" accept=".xlsx,.xls">
          <div class="upload-icon">📄</div>
          <div class="upload-label">Drop your Excel file here or <strong onclick="document.getElementById('file-input').click()">browse</strong></div>
          <div class="file-name" id="file-name-display"></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:0.75rem;min-width:200px;">
        <div>
          <div style="font-size:13px;font-weight:500;margin-bottom:0.4rem;">Frame rate</div>
          <select id="fps-select">
            <option value="25" selected>25 fps</option>
            <option value="23.976">23.976 fps</option>
            <option value="24">24 fps</option>
            <option value="29.97">29.97 fps (drop)</option>
            <option value="30">30 fps</option>
          </select>
        </div>
        <div>
          <div style="font-size:13px;font-weight:500;margin-bottom:0.4rem;">Header rows to skip</div>
          <input id="skip-rows" type="number" value="1" min="0" max="10" style="padding:0.45rem 0.75rem;border:0.5px solid #ccc;border-radius:8px;font-size:14px;width:80px;">
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Checks to run</div>
    <div class="checks-grid" id="checks-grid"></div> 
    <div class="controls-row">
      <button class="btn btn-primary" id="run-btn" onclick="runChecks()" disabled>Run checks</button>
      <button class="btn btn-secondary" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <div id="results-area">
    <div class="card">
      <div class="stats-row" id="stats-row"></div>
      <div class="results-table-wrap">
        <table id="results-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Row</th>
              <th>Start</th>
              <th>End</th>
              <th>Dialogue</th>
              <th>CPS</th>
              <th>Errors</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const CHECKS = [
  { id:'emptyline', label:'Empty dialogue (Col E)', defaultOn:true },
  { id:'no_punct', label:'No ending punctuation', defaultOn:true },
  { id:'comma_detect', label:'Last line ends with comma', defaultOn:true },
  { id:'char37', label:'Character limit: 37', defaultOn:true },
  { id:'char42', label:'Character limit: 42', defaultOn:true },
  { id:'gap2', label:'Min 2-frame gap', defaultOn:true },
  { id:'overlap', label:'Subtitle Overlaps', defaultOn:true },
  { id:'curlya', label:"Curly apostrophe", defaultOn:true },
  { id:'multispc', label:'Multiple spaces', defaultOn:true },
  { id:'maxlines2', label:'Maximum 2 lines', defaultOn:true }
];

let workbook = null;

function buildCheckboxes() {
  const grid = document.getElementById('checks-grid');
  grid.innerHTML = '';
  CHECKS.forEach((c, i) => {
    const div = document.createElement('label');
    div.className = 'check-item';
    div.innerHTML = `<input type="checkbox" id="chk_${c.id}" ${c.defaultOn?'checked':''}>
                     <span class="check-num">${i+1}.</span>
                     <span class="check-label">${c.label}</span>`;
    grid.appendChild(div);
  });
}

function isChecked(id) { return document.getElementById('chk_'+id)?.checked; }
function stripTags(text) { return String(text||'').replace(/<\/?[^>]+(>|$)/g, ""); }
function getLines(text) { return text ? String(text).split(/\r?\n/) : []; }

function tsToFrames(val, fps) {
  if (!val) return null;
  const parts = String(val).trim().split(':');
  if (parts.length < 4) return null;
  const h=parseInt(parts[0])||0, m=parseInt(parts[1])||0, s=parseInt(parts[2])||0, f=parseInt(parts[3])||0;
  return Math.round((h*3600 + m*60 + s) * fps + f);
}

function loadFile(file) {
  document.getElementById('file-name-display').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    workbook = XLSX.read(e.target.result, { type:'array', raw:false });
    document.getElementById('run-btn').disabled = false;
  };
  reader.readAsArrayBuffer(file);
}

function runChecks() {
  if (!workbook) return;
  const fps = parseFloat(document.getElementById('fps-select').value);
  const skip = parseInt(document.getElementById('skip-rows').value)||1;
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' });
  const rows = raw.slice(skip);

  const processed = rows.map((row, idx) => {
    const dialogue = row[4] != null ? String(row[4]) : '';
    const startF = tsToFrames(row[1], fps);
    const endF = tsToFrames(row[2], fps);
    let rs = "";
    if (startF!==null && endF!==null && endF>startF && dialogue.trim()!=='') {
        rs = (stripTags(dialogue).replace(/\s+/g,'').length / ((endF-startF)/fps)).toFixed(1);
    }
    return { rowNum:idx+skip+1, startTs:row[1], endTs:row[2], dialogue, rs, startF, endF, errors:[] };
  }).filter(r => r.startTs || r.endTs || r.dialogue);

  processed.forEach((r, i) => {
    const lines = getLines(r.dialogue);
    const fullTrim = r.dialogue.trim();

    if (isChecked('emptyline') && !fullTrim) {
      r.errors.push('Empty dialogue');
    }

    if (lines.length > 0 && fullTrim !== '') {
      const lastLine = lines[lines.length - 1].trimEnd();
      
      // COMMA DETECTOR
      if (isChecked('comma_detect') && lastLine.endsWith(',')) {
        r.errors.push('Ends with comma');
      }

      // NO ENDING PUNCTUATION CHECK
      if (isChecked('no_punct')) {
        const lastChar = lastLine.slice(-1);
        // Checks if last char is NOT . ! or ?
        if (!/[.!?]/.test(lastChar)) {
          r.errors.push('No punctuation');
        }
      }

      const maxLineLen = Math.max(...lines.map(l => stripTags(l).length));
      if (isChecked('char37') && maxLineLen > 37) r.errors.push(`Over 37ch (${maxLineLen})`);
      if (isChecked('char42') && maxLineLen > 42) r.errors.push(`Over 42ch (${maxLineLen})`);
      if (isChecked('maxlines2') && lines.length > 2) r.errors.push(`Lines: ${lines.length}`);
    }

    if (i < processed.length - 1) {
      const gap = processed[i+1].startF - r.endF;
      if (isChecked('overlap') && gap < 0) r.errors.push('Overlap');
      else if (isChecked('gap2') && gap >= 0 && gap < 2) r.errors.push('Gap < 2f');
    }
  });

  renderResults(processed);
}

function renderResults(data) {
  document.getElementById('results-area').style.display = 'block';
  const tbody = document.getElementById('results-body');
  tbody.innerHTML = '';
  const errorRows = data.filter(r => r.errors.length > 0);

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-box"><div class="val">${data.length}</div><div class="lbl">Total Rows</div></div>
    <div class="stat-box err"><div class="val">${errorRows.length}</div><div class="lbl">Error Rows</div></div>
  `;

  data.forEach((r, idx) => {
    const tr = document.createElement('tr');
    if (r.errors.length > 0) tr.classList.add('has-error');
    tr.innerHTML = `<td>${idx+1}</td><td>${r.rowNum}</td><td>${r.startTs}</td><td>${r.endTs}</td>
                    <td class="dialogue-cell">${getLines(r.dialogue).join('<br>')}</td><td>${r.rs}</td>
                    <td>${r.errors.map(e=>`<span class="etag">${e}</span>`).join('')}</td>`;
    tbody.appendChild(tr);
  });
}

function resetAll() { location.reload(); }
document.getElementById('file-input').addEventListener('change', e => loadFile(e.target.files[0]));
document.getElementById('drop-zone').addEventListener('dragover', e => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); });
document.getElementById('drop-zone').addEventListener('dragleave', e => e.currentTarget.classList.remove('drag-over'));
document.getElementById('drop-zone').addEventListener('drop', e => { e.preventDefault(); loadFile(e.dataTransfer.files[0]); });
buildCheckboxes();
</script>
</body>
</html>
